services:
  db_kozuchi:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${KOZUCHI_DATABASE_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}

    volumes:
      - volume_kozuchi_db:/var/lib/postgresql/data

    networks:
      - net_kozuchi

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 60s
      retries: 5
      start_period: 5s

  rails_kozuchi:
    build:
      context: .
      dockerfile: Dockerfile

    restart: always
    
    environment:
      # 機密情報は .env ファイルに記載してください（.env.example を参考に作成）
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}

      KOZUCHI_DATABASE_PASSWORD: ${KOZUCHI_DATABASE_PASSWORD}
      RAILS_ENV: production
      RAILS_SERVE_STATIC_FILES: "true"
      #SUPPORT_EMAIL_ADDRESS: mail@example.com
      #ROOT_URL: http://localhost:3000
      KOZUCHI_SSL: "true"
      # KOZUCHI_SSL: "true" の場合は以下も .env に設定してください
      SSL_KEY_PATH: ${SSL_KEY_PATH}
      SSL_CERT_PATH: ${SSL_CERT_PATH}

    volumes:
      - /etc/letsencrypt:/etc/letsencrypt

    ports:
      - 3010:3000
      - 443:443

    depends_on:
      db_kozuchi:
        condition: service_healthy

    networks:
      - net_kozuchi
      
volumes:
  volume_kozuchi_db:
    name: volume_kozuchi_db
    external: true
networks:
  net_kozuchi:

